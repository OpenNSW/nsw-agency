apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: nsw-agency-service

endpoints:
  - name: api
    port: 8081
    type: HTTP
    basePath: /
    visibility:
      - external

configurations:
  env:
    - name: PORT
      value: "8081"
    - name: FORMS_PATH
      value: ./data/forms
    - name: DEFAULT_FORM_ID
      value: default
    - name: ALLOWED_ORIGINS
      value: http://localhost:5174,http://localhost:5175,http://localhost:5176
    - name: DB_DRIVER
      value: "postgres"
    - name: DB_HOST
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: host
    - name: DB_PORT
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: port
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: password
    - name: DB_NAME
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: database
    - name: NSW_API_BASE_URL
      valueFrom:
        secretKeyRef:
          name: nsw-api-secrets
          key: client_id
    - name: NSW_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: nsw-api-secrets
          key: client_secret
    - name: NSW_SCOPES
    - name: NSW_AGENCY
    - name: AUTH_JWKS_URL
    - name: AUTH_ISSUER
    - name: AUTH_AUDIENCE
    - name: AUTH_CLIENT_IDS
    # Frontend config forwarded to the browser via /runtime-env.js
    - name: UI_DIR
      value: ./ui
    - name: VITE_INSTANCE_CONFIG
      value: npqs
    - name: VITE_BRANDING_NAME
      value: default
    - name: VITE_API_BASE_URL
      value: ''
    - name: VITE_IDP_BASE_URL
    - name: VITE_IDP_CLIENT_ID
    - name: VITE_APP_URL
    - name: VITE_IDP_SCOPES
      value: openid,profile,email
    - name: VITE_IDP_PLATFORM
      value: AsgardeoV2
