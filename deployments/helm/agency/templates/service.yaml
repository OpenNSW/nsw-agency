apiVersion: v1
kind: Service
metadata:
  name: {{ include "agency.fullname" . }}
  labels:
    {{- include "agency.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "agency.selectorLabels" . | nindent 4 }}
