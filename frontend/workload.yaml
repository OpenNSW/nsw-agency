apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: nsw-agency-portal

endpoints:
  - name: web
    port: 80
    type: HTTP
    basePath: /
    visibility:
      - external

configurations:
  env:
    - name: VITE_INSTANCE_CONFIG
      value: npqs
    - name: VITE_API_BASE_URL
      value: http://localhost:8081
    - name: VITE_IDP_BASE_URL
      value: https://localhost:8090
    - name: VITE_IDP_CLIENT_ID
      value: NSW_AGENCY_PORTAL_APP_NPQS
    - name: VITE_APP_URL
      value: http://localhost:5174
    - name: VITE_NSW_AGENCY_API_BASE_URL
      value: http://localhost:8080/api/v1
    - name: VITE_IDP_SCOPES
      value: openid,profile,email
    - name: VITE_IDP_PLATFORM
      value: AsgardeoV2
